<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Note Sheet</title>

    <link
        rel="stylesheet"
        href="notepad.css"
    />
</head>

<body>

    <div id="topbar">
        <div
            id="titleInput"
            class="center"
            contenteditable="true"
            spellcheck="false"
            autocorrect="off"
            autocomplete="off"
        >
            Title
        </div>

        <div id="formattingControls">
            <select id="colorSelect" aria-label="Text color">
                <option value="black">Black</option>
                <option value="red">Red</option>
                <option value="yellow">Yellow</option>
                <option value="orange">Orange</option>
                <option value="green">Green</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="brown">Brown</option>
                <option value="pink">Pink</option>
            </select>

            <button id="boldButton" class="formatButton" type="button">B</button>
            <button id="italicButton" class="formatButton" type="button">I</button>
            <button id="resetStyleButton" class="formatButton" type="button">Reset</button>
        </div>
    </div>

    <div id="startupOverlay" class="overlay hidden" aria-hidden="true">
        <div class="windowCard">
            <div class="windowCardHeader">Choose a folder to start</div>
            <p>
                Pick the folder that holds your notes. The file browser will open right after you select it.
            </p>
            <button id="startupSelectFolderButton" class="primaryButton" type="button">Select Folder</button>
        </div>
    </div>

    <aside id="fileBrowser" class="fileBrowser hidden" aria-label="Folder files">
        <div class="fileBrowserHeader">
            <div>
                <div class="fileBrowserTitle">Files</div>
                <div id="folderName" class="fileBrowserSubtitle">No folder selected</div>
            </div>

            <div class="fileBrowserActions">
                <button id="browserSelectFolderButton" class="secondaryButton" type="button">Change Folder</button>
                <button id="refreshFilesButton" class="secondaryButton" type="button">Refresh</button>
                <button id="newFileButton" class="primaryButton" type="button">New File</button>
            </div>
        </div>

        <div id="fileList" class="fileList" role="list"></div>
    </aside>

    <div
        id="editor"
        contenteditable="true"
        spellcheck="true"
        autocorrect="off"
        autocomplete="off"
    ></div>

    <div id="statusbar">
        <span>
            <span
                class="status-dot"
                id="statusdot"
            ></span>

            <button
                id="saveButton"
                class="statusBarButton"
            >
                Save
            </button>

            <button
                id="loadButton"
                class="statusBarButton"
            >
                Files
            </button>
        </span>

        <span id="wordcount">
            0 words
        </span>
    </div>

    <div id="tooltip"></div>

    <script
        type="module"
        src="main.js"
    ></script>

</body>
</html>
